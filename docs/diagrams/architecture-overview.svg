  <line x1="540" y1="318" x2="632" y2="366" stroke="#10b981" stroke-width="2.2" marker-end="url(#arrow-green)"/>
  <line x1="540" y1="446" x2="632" y2="446" stroke="#a855f7" stroke-width="2.2" marker-end="url(#arrow-purple)"/>

  <text x="283" y="236" fill="#c4b5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.5" text-anchor="middle">read path</text>
  <text x="285" y="324" fill="#fdba74" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.5" text-anchor="middle">write path</text>
  <text x="586" y="194" fill="#93c5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.5" text-anchor="middle">index / recall</text>
  <text x="585" y="349" fill="#a7f3d0" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.5" text-anchor="middle">persist lessons</text>
  <text x="586" y="435" fill="#ddd6fe" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.5" text-anchor="middle">save script assets</text>

  <rect x="72" y="548" width="816" height="22" rx="11" fill="#111827" stroke="#334155" stroke-width="1"/>
  <text x="480" y="563" fill="#64748b" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" text-anchor="middle">Principle: tool behavior is the unit of memory, so the store is keyed by tool-name rather than by project or prompt.</text>
</svg>
