  <text x="435" y="296" fill="#ffedd5" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" text-anchor="middle">runtimes/codex_runtime.py</text>
  <text x="435" y="317" fill="#fdba74" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" text-anchor="middle">add_checkpoint()</text>
  <text x="435" y="334" fill="#fdba74" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" text-anchor="middle">load_codex_source_text()</text>
  <text x="435" y="351" fill="#fdba74" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" text-anchor="middle">flush_summary_to_knowledge()</text>
  <rect x="330" y="392" width="210" height="110" rx="10" fill="#312e81" stroke="#a855f7" stroke-width="1.2"/>
  <text x="435" y="418" fill="#ede9fe" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" text-anchor="middle">Decision rules</text>
  <text x="435" y="439" fill="#ddd6fe" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" text-anchor="middle">tool-key scoped storage</text>
  <text x="435" y="456" fill="#ddd6fe" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" text-anchor="middle">dedupe + HIT counters</text>
  <text x="435" y="473" fill="#ddd6fe" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" text-anchor="middle">script registry as first-class asset</text>

  <rect x="608" y="122" width="280" height="408" rx="12" fill="#111827" stroke="#334155" stroke-width="1"/>
  <text x="748" y="146" fill="#6ee7b7" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" text-anchor="middle" font-weight="700">Memory Layer</text>
  <rect x="632" y="170" width="232" height="112" rx="10" fill="#052e16" stroke="#10b981" stroke-width="1.6"/>
  <text x="748" y="195" fill="#d1fae5" font-family="'SF Mono', 'Fira Code', monospace" font-size="10.5" text-anchor="middle">memory_core/store.py</text>
  <text x="748" y="216" fill="#a7f3d0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" text-anchor="middle">merge_lessons()</text>
  <text x="748" y="233" fill="#a7f3d0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" text-anchor="middle">build_injection_text()</text>
  <text x="748" y="250" fill="#a7f3d0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" text-anchor="middle">register_script() / export_script()</text>
  <rect x="632" y="310" width="232" height="132" rx="10" fill="#0f172a" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="748" y="334" fill="#bfdbfe" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" text-anchor="middle">On-disk model</text>
  <text x="748" y="357" fill="#93c5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" text-anchor="middle">&lt;memory-home&gt;/tools/&lt;tool-key&gt;/</text>
  <text x="748" y="375" fill="#93c5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" text-anchor="middle">KNOWLEDGE.md</text>
  <text x="748" y="392" fill="#93c5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" text-anchor="middle">CHECKPOINTS.md</text>
  <text x="748" y="409" fill="#93c5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" text-anchor="middle">SCRIPTS.md + scripts/</text>
  <rect x="632" y="466" width="232" height="36" rx="10" fill="#172554" stroke="#60a5fa" stroke-width="1"/>
  <text x="748" y="489" fill="#dbeafe" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.5" text-anchor="middle">Portable across Codex / Claude-style sessions</text>

  <line x1="242" y1="296" x2="330" y2="206" stroke="#a855f7" stroke-width="2.2" marker-end="url(#arrow-purple)"/>
  <line x1="242" y1="296" x2="330" y2="318" stroke="#f97316" stroke-width="2.2" marker-end="url(#arrow-orange)"/>
