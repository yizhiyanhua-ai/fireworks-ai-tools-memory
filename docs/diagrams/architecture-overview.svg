  <rect width="960" height="620" rx="18" fill="url(#bg)"/>
  <text x="480" y="38" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="18" text-anchor="middle" font-weight="700">fireworks-ai-tools-memory · Architecture Overview</text>
  <text x="480" y="58" fill="#94a3b8" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" text-anchor="middle">Cross-session tool memory for inject, checkpoint, distill, and script reuse</text>

  <rect x="40" y="90" width="880" height="490" rx="16" fill="#0f172a" stroke="#334155" stroke-width="1.2"/>

  <rect x="72" y="122" width="190" height="408" rx="12" fill="#111827" stroke="#334155" stroke-width="1"/>
  <text x="167" y="146" fill="#c4b5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" text-anchor="middle" font-weight="700">Caller Layer</text>
  <rect x="92" y="170" width="150" height="58" rx="10" fill="#1e1b4b" stroke="#a855f7" stroke-width="1.6"/>
  <text x="167" y="194" fill="#e9d5ff" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" text-anchor="middle">User / Agent</text>
  <text x="167" y="211" fill="#c4b5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.5" text-anchor="middle">asks for a tool workflow</text>
  <rect x="92" y="254" width="150" height="84" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1.6"/>
  <text x="167" y="279" fill="#bfdbfe" font-family="'SF Mono', 'Fira Code', monospace" font-size="10.5" text-anchor="middle">CLI Entry</text>
  <text x="167" y="298" fill="#93c5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.5" text-anchor="middle">inject</text>
  <text x="167" y="314" fill="#93c5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.5" text-anchor="middle">checkpoint</text>
  <text x="167" y="330" fill="#93c5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.5" text-anchor="middle">flush / register-script</text>
  <rect x="92" y="366" width="150" height="136" rx="10" fill="#172554" stroke="#60a5fa" stroke-width="1.2" stroke-dasharray="5 5"/>
  <text x="167" y="391" fill="#dbeafe" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" text-anchor="middle">Natural-language triggers</text>
  <text x="167" y="414" fill="#93c5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.5" text-anchor="middle">“Remember this tool pitfall”</text>
  <text x="167" y="432" fill="#93c5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.5" text-anchor="middle">“Inject yt-dlp+mpv lessons first”</text>
  <text x="167" y="450" fill="#93c5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.5" text-anchor="middle">“Store this script for later”</text>
  <text x="167" y="468" fill="#93c5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.5" text-anchor="middle">“Distill this session into lessons”</text>

  <rect x="306" y="122" width="258" height="408" rx="12" fill="#111827" stroke="#334155" stroke-width="1"/>
  <text x="435" y="146" fill="#fdba74" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" text-anchor="middle" font-weight="700">Runtime Layer</text>
