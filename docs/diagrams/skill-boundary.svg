<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" width="960" height="600">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="a3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
  </defs>
  <rect width="960" height="600" rx="18" fill="url(#bg3)"/>
  <text x="480" y="38" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="18" text-anchor="middle" font-weight="700">Why This Project Exists Separately</text>
  <text x="480" y="58" fill="#94a3b8" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" text-anchor="middle">Skill memory and tool memory solve different failure surfaces</text>

  <rect x="56" y="96" width="396" height="444" rx="16" fill="#0f172a" stroke="#7c3aed" stroke-width="1.6"/>
  <rect x="508" y="96" width="396" height="444" rx="16" fill="#0f172a" stroke="#1d4ed8" stroke-width="1.6"/>

  <text x="254" y="128" fill="#ddd6fe" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" text-anchor="middle" font-weight="700">fireworks-skill-memory</text>
  <text x="706" y="128" fill="#bfdbfe" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" text-anchor="middle" font-weight="700">fireworks-ai-tools-memory</text>

  <rect x="84" y="160" width="340" height="88" rx="12" fill="#1e1b4b" stroke="#a855f7" stroke-width="1.2"/>
  <text x="254" y="188" fill="#ede9fe" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" text-anchor="middle">Unit of memory</text>
  <text x="254" y="209" fill="#c4b5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.5" text-anchor="middle">How one named skill should behave</text>
  <text x="254" y="227" fill="#c4b5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.5" text-anchor="middle">better over time</text>

  <rect x="536" y="160" width="340" height="88" rx="12" fill="#172554" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="706" y="188" fill="#dbeafe" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" text-anchor="middle">Unit of memory</text>
  <text x="706" y="209" fill="#93c5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.5" text-anchor="middle">How one tool or toolchain behaves</text>
  <text x="706" y="227" fill="#93c5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.5" text-anchor="middle">across many projects and skills</text>

  <rect x="84" y="272" width="340" height="172" rx="12" fill="#111827" stroke="#a855f7" stroke-width="1.2" stroke-dasharray="5 5"/>
  <text x="254" y="298" fill="#ede9fe" font-family="'SF Mono', 'Fira Code', monospace" font-size="10.5" text-anchor="middle">Good examples</text>
  <text x="254" y="324" fill="#c4b5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.5" text-anchor="middle">• fireworks-radio should prefer</text>
  <text x="254" y="341" fill="#c4b5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.5" text-anchor="middle">  yt-dlp + mpv after rights failures</text>
  <text x="254" y="364" fill="#c4b5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.5" text-anchor="middle">• a skill should remember user taste</text>
  <text x="254" y="381" fill="#c4b5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.5" text-anchor="middle">  or output structure preferences</text>
  <text x="254" y="404" fill="#c4b5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.5" text-anchor="middle">• a skill should encode its own</text>
  <text x="254" y="421" fill="#c4b5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.5" text-anchor="middle">  fallback order and legal posture</text>

  <rect x="536" y="272" width="340" height="172" rx="12" fill="#111827" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="5 5"/>
  <text x="706" y="298" fill="#dbeafe" font-family="'SF Mono', 'Fira Code', monospace" font-size="10.5" text-anchor="middle">Good examples</text>
  <text x="706" y="324" fill="#93c5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.5" text-anchor="middle">• ncm-cli often searches successfully</text>
  <text x="706" y="341" fill="#93c5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.5" text-anchor="middle">  but still fails on playable source</text>
  <text x="706" y="364" fill="#93c5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.5" text-anchor="middle">• Spotify CLI can fail on callback or</text>
  <text x="706" y="381" fill="#93c5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.5" text-anchor="middle">  Premium restrictions</text>
  <text x="706" y="404" fill="#93c5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.5" text-anchor="middle">• a working shell script should be</text>
  <text x="706" y="421" fill="#93c5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.5" text-anchor="middle">  recoverable next time</text>

  <rect x="84" y="466" width="340" height="46" rx="12" fill="#2e1065" stroke="#a855f7" stroke-width="1.2"/>
  <text x="254" y="488" fill="#e9d5ff" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle">Best when the lesson only makes sense</text>
  <text x="254" y="503" fill="#e9d5ff" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle">inside one named skill.</text>

  <rect x="536" y="466" width="340" height="46" rx="12" fill="#082f49" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="706" y="488" fill="#dbeafe" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle">Best when the lesson should survive across</text>
  <text x="706" y="503" fill="#dbeafe" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle">repos, projects, and agent personas.</text>

  <line x1="452" y1="318" x2="508" y2="318" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#a3)"/>
  <text x="480" y="306" fill="#94a3b8" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.5" text-anchor="middle">boundary</text>

  <rect x="170" y="554" width="620" height="22" rx="11" fill="#111827" stroke="#334155" stroke-width="1"/>
  <text x="480" y="569" fill="#64748b" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" text-anchor="middle">Necessary because forcing tool pain into skill memory makes the lesson too local and much less reusable.</text>
</svg>
